<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Profile - Professional Look</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Yahan specific attractive extra styles add kar rahe hain */
        .bio-link { color: #00376b; text-decoration: none; font-weight: 500; }
        
        /* Highlight Stories Section */
        .highlights-container {
            display: flex;
            padding: 10px 16px;
            gap: 15px;
            overflow-x: auto; /* Scroll horizontally */
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none; /* Hide scrollbar Firefox */
        }
        .highlights-container::-webkit-scrollbar { display: none; } /* Hide scrollbar Chrome/Safari */

        .highlight-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 70px;
            flex-shrink: 0;
        }
        
        .highlight-ring {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(#ffffff, #ffffff) padding-box,
                        linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%) border-box;
            border: 2px solid transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2px;
            cursor: pointer;
        }
        
        .highlight-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .highlight-text {
            font-size: 11px;
            color: #262626;
            margin-top: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 64px;
        }

        /* Post Interactions Overlay (Real Grid look) */
        .post-item {
            position: relative;
            cursor: pointer;
        }
        .post-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.2s ease;
            color: white;
            font-weight: 600;
            font-size: 16px;
            gap: 15px;
        }
        .post-item:hover .post-overlay {
            opacity: 1;
        }
        .overlay-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
