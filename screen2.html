<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Specific Styles for Home Feed Screen */
        
        /* 1. Top Navbar Modification for Home Feed */
        .feed-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid #efefef;
        }
        .feed-header .logo {
            font-family: 'Style Script', cursive, sans-serif;
            font-size: 22px;
            font-weight: bold;
            font-style: italic;
        }
        .feed-header i {
            font-size: 20px;
            cursor: pointer;
        }

        /* 2. Horizontal Stories Section (Flexbox) */
        .stories-bar {
            display: flex;
            padding: 10px 0 10px 16px;
            gap: 12px;
            overflow-x: auto; /* Horizontal scroll enable karne ke liye */
            border-bottom: 1px solid #efefef;
            scrollbar-width: none;
        }
        .stories-bar::-webkit-scrollbar {
            display: none; /* Hide scrollbar for clean look */
        }
        .story-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0; /* Items squeeze na hon */
        }
        .story-ring {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            padding: 2px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .story-ring.my-story::after {
            content: '+';
            position: absolute;
            bottom: 0; right: 0;
            background: #0095f6; color: white;
            width: 16px; height: 16px;
            border-radius: 50%; font-size: 12px;
            display: flex; justify-content: center; align-items: center;
            border: 2px solid white;
        }
        .story-pic {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
        }
        .story-username {
            font-size: 11px;
            color: #262626;
            margin-top: 4px;
            width: 58px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-align: center;
        }

        /* 3. Main Post Card Layout */
        .post-card {
            background: white;
            margin-bottom: 15px;
        }
        .post-user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
        }
        .post-user-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }
        .post-username {
            font-size: 13px;
            font-weight: 600;
        }
        
        /* Gradient Post Image like your screenshot */
        .post-image-area {
            width: 100%;
            height: 300px;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%); /* Pink/Gradient box like screenshot */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .post-image-area.purple {
            background: linear-gradient(135deg, #65799b 0%, #5e2563 100%);
        }

        /* Post Action Icons (Flexbox) */
        .post-actions {
            display: flex;
            justify-content: space-between;
            padding: 12px 14px;
        }
        .post-actions-left {
            display: flex;
            gap: 16px;
        }
        .post-actions i {
            font-size: 20px;
            cursor: pointer;
        }
        .fa-heart.active { color: #ed4956; }

        /* Captions and Comments text */
        .post-details {
            padding: 0 14px;
            font-size: 13px;
            line-height: 1.5;
        }
        .likes-count { font-weight: 600; margin-bottom: 5px; }
        .caption { margin-bottom: 5px; }
        .caption span { font-weight: 600; margin-right: 5px; }
        .view-comments { color: #8e8e8e; cursor: pointer; margin-bottom: 5px; }

        /* 4. Fixed Bottom Tab Bar Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 420px;
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 0;
            border-top: 1px solid #efefef;
            z-index: 999;
        }
        .bottom-nav a {
            color: #262626;
            font-size: 20px;
            text-decoration: none;
        }
        .bottom-nav .profile-icon-nav {
            width: 24px; height: 24px;
            border-radius: 50%;
            border: 1px solid #262626;
        }
    </style>
</head>
