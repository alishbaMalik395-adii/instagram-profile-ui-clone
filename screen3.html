<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram - Explore Feed (Screen 3)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Specific Styles for Explore Page Layout */
        
        /* 1. Search Bar Header */
        .explore-header {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            gap: 12px;
            border-bottom: 1px solid #efefef;
            background: white;
        }
        .search-box-container {
            display: flex;
            align-items: center;
            background: #efefef;
            padding: 8px 14px;
            border-radius: 10px;
            flex: 1;
            gap: 10px;
        }
        .search-box-container i { color: #8e8e8e; font-size: 14px; }
        .search-placeholder { color: #8e8e8e; font-size: 14px; font-weight: 400; }
        .explore-header .header-icon { font-size: 20px; color: #262626; cursor: pointer; }

        /* 2. Top Categories Filter Tags (Flexbox) */
        .categories-bar {
            display: flex;
            padding: 10px 0 10px 16px;
            gap: 8px;
            overflow-x: auto;
            border-bottom: 1px solid #efefef;
            scrollbar-width: none;
            background: white;
        }
        .categories-bar::-webkit-scrollbar { display: none; }
        .category-tag {
            background: white;
            border: 1px solid #dbdbdb;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 3. ADVANCED ASYMMETRIC CSS GRID WITH GRADIENT IMAGES */
        .explore-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 Columns */
            grid-auto-rows: 130px; /* Standard square height */
            gap: 4px;
            padding: 4px 0;
        }

        .explore-item {
            position: relative;
            overflow: hidden;
            background-size: cover;
            background-position: center;
        }

        /* Instagram post type badges */
        .icon-badge { 
            position: absolute; 
            top: 10px; 
            right: 10px; 
            color: white; 
            font-size: 14px;
            text-shadow: 0 0 4px rgba(0,0,0,0.5);
            z-index: 2;
        }

        /* Screen Color Overlays to match your pinkish/purplish screenshot */
        .explore-item::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255, 117, 140, 0.4) 0%, rgba(255, 126, 179, 0.4) 100%);
            z-index: 1;
        }

        /* --- Individual Box Styling with Real Image Links --- */
        
        /* Box 1: Small Square */
        .box-1 { 
            background-image: url('https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=300'); 
        }
        
        /* Box 2: Large Spanning Grid Box (Takes 2 Columns & 2 Rows) */
        .box-2 {
            grid-column: 2 / span 2;
            grid-row: 1 / span 2;
            background-image: url('https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=500');
        }
        .box-2::before {
            background: linear-gradient(135deg, rgba(240, 148, 51, 0.3) 0%, rgba(220, 39, 67, 0.4) 100%);
        }

        /* Box 3: Below Box 1 */
        .box-3 { 
            grid-column: 1; 
            grid-row: 2; 
            background-image: url('https://images.unsplash.com/photo-1531403009284-440f080d1e12?w=300'); 
        }

        /* Middle Grid Rows */
        .box-4 { background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=300'); }
        .box-5 { background-image: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?w=300'); }
        .box-6 { background-image: url('https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=300'); }
        .box-6::before { background: linear-gradient(135deg, rgba(101, 121, 155, 0.4) 0%, rgba(94, 37, 99, 0.5) 100%); }

        .box-7 { background-image: url('https://images.unsplash.com/photo-1488590528505-98d2b5aba04b?w=300'); }
        .box-8 { background-image: url('https://images.unsplash.com/photo-1518770660439-4636190af475?w=300'); }
        .box-9 { background-image: url('https://images.unsplash.com/photo-1531297484001-80022131f5a1?w=300'); }

        /* Box 10: Horizontal Full Width Banner Box (Spans 3 columns) */
        .box-10 {
            grid-column: 1 / span 3;
            grid-row: 5;
            background-image: url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=600');
        }
        .box-10::before {
            background: linear-gradient(135deg, rgba(161, 196, 253, 0.4) 0%, rgba(194, 233, 251, 0.4) 100%);
        }
        
        .box-11 { background-image: url('https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=300'); }

        /* 4. Bottom Tab Bar Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 420px;
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 0;
            border-top: 1px solid #efefef;
            z-index: 999;
        }
        .bottom-nav a { color: #262626; font-size: 20px; text-decoration: none; }
        .bottom-nav .profile-icon-nav { width: 24px; height: 24px; border-radius: 50%; border: 1px solid #262626; }
    </style>
</head>
<body>

    <div class="mobile-container" style="padding-bottom: 60px; position: relative;">
        
        <header class="explore-header">
            <div class="search-box-container">
                <i class="fas fa-search"></i>
                <span class="search-placeholder">Search</span>
            </div>
            <i class="fas fa-qrcode header-icon"></i>
        </header>

        <section class="categories-bar">
            <div class="category-tag"><i class="fas fa-shopping-bag"></i> Shop</div>
            <div class="category-tag"><i class="fas fa-lock"></i> Style</div>
            <div class="category-tag">Travel</div>
            <div class="category-tag">Architecture</div>

        <main class="explore-grid">
            
            <div class="explore-item box-1"></div>
            <div class="explore-item box-2">
                <i class="fas fa-video icon-badge"></i> </div>
            <div class="explore-item box-3">
                <i class="far fa-clone icon-badge"></i> </div>
            
            <div class="explore-item box-4"></div>
            <div class="explore-item box-5"></div>
            <div class="explore-item box-6">
                <i class="far fa-clone icon-badge"></i>
            </div>
            
            <div class="explore-item box-7"></div>
            <div class="explore-item box-8">
                <i class="fas fa-video icon-badge"></i>
            </div>
            <div class="explore-item box-9"></div>

            <div class="explore-item box-10">
                <i class="far fa-clone icon-badge"></i>
            </div>
            
            <div class="explore-item box-11"></div>

        </main>

        <nav class="bottom-nav">
            <a href="screen2.html"><i class="fas fa-home"></i></a>
            <a href="screen3.html" style="color: #000;"><i class="fas fa-search"></i></a>
            <a href="#"><i class="far fa-plus-square"></i></a>
            <a href="#"><i class="far fa-heart"></i></a>
            <a href="index.html">
                <img src="C:\Users\Marhaba\Pictures\Saved Pictures\images (15).jpg" alt="Profile" class="profile-icon-nav">
            </a>
        </nav>

    </div>

</body>
</html>
